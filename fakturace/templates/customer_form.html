<!DOCTYPE html>
<html lang="cs">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fakturace — {{ 'Nový zákazník' if not customer else customer.name }}</title>
<link rel="stylesheet" href="/static/style.css?v=4"></head>
<body><div class="wrap">
{% include "_nav.html" %}

<div class="card">
  <h2>{{ 'Nový zákazník' if not customer else 'Upravit zákazníka' }}</h2>
  <form method="post" action="{{ '/customers/add' if not customer else '/customers/' + customer.id|string + '/edit' }}">

    <!-- ARES lookup -->
    <div class="form-row" style="margin-bottom:14px;">
      <div class="field wide">
        <label>Vyhledat v ARES (IČO nebo název)</label>
        <div class="ares-wrap">
          <input type="text" id="ares-query" placeholder="např. 12345678 nebo Avantro" autocomplete="off"
                 oninput="aresInput(this.value)"
                 onkeydown="if(event.key==='Enter'){event.preventDefault();aresInput(this.value);}">
          <ul class="ares-results" id="ares-results" style="display:none;"></ul>
        </div>
      </div>
    </div>

    <div class="form-row" style="margin-bottom:10px;">
      <div class="field wide">
        <label>Název *</label>
        <input type="text" name="name" id="f-name" value="{{ customer.name if customer else '' }}" required>
      </div>
      <div class="field narrow">
        <label>IČO</label>
        <input type="text" name="ico" id="f-ico" value="{{ customer.ico if customer else '' }}" maxlength="8">
      </div>
      <div class="field narrow">
        <label>DIČ</label>
        <input type="text" name="dic" id="f-dic" value="{{ customer.dic if customer else '' }}">
      </div>
    </div>
    <div class="form-row" style="margin-bottom:10px;">
      <div class="field wide">
        <label>Ulice</label>
        <input type="text" name="street" id="f-street" value="{{ customer.street if customer else '' }}">
      </div>
      <div class="field narrow">
        <label>PSČ</label>
        <input type="text" name="zip" id="f-zip" value="{{ customer.zip if customer else '' }}" maxlength="6">
      </div>
      <div class="field wide">
        <label>Město</label>
        <input type="text" name="city" id="f-city" value="{{ customer.city if customer else '' }}">
      </div>
    </div>
    <div class="form-row" style="margin-bottom:16px;">
      <div class="field wide">
        <label>E-mail</label>
        <input type="email" name="email" value="{{ customer.email if customer else '' }}">
      </div>
      <div class="field wide">
        <label>Poznámka</label>
        <input type="text" name="note" value="{{ customer.note if customer else '' }}">
      </div>
    </div>

    <div style="display:flex;gap:8px;">
      <button type="submit">Uložit</button>
      <a class="btn btn-secondary" href="/customers">Zrušit</a>
    </div>
  </form>
</div>

<footer>Fakturace · běží lokálně</footer>
</div>

<script>
let aresTimer;
let aresCache = [];

function aresInput(val) {
  clearTimeout(aresTimer);
  const list = document.getElementById('ares-results');
  if (val.length < 2) { list.style.display = 'none'; return; }
  list.innerHTML = '<li style="color:var(--muted);">Hledám…</li>';
  list.style.display = 'block';
  aresTimer = setTimeout(async () => {
    try {
      if (/^\d{6,8}$/.test(val.trim())) {
        const res = await fetch('/ares/ico/' + val.trim());
        if (res.ok) { fillForm(await res.json()); list.style.display = 'none'; return; }
      }
      const res = await fetch('/ares/search?q=' + encodeURIComponent(val));
      const results = await res.json();
      if (!results.length) {
        list.innerHTML = '<li style="color:var(--muted);">Nic nenalezeno.</li>';
        return;
      }
      aresCache = results;
      list.innerHTML = results.map((r, i) =>
        `<li onclick="fillForm(${i})"><b>${r.name}</b> <span style="color:var(--muted);font-size:12px;">IČO: ${r.ico} · ${r.city}</span></li>`
      ).join('');
    } catch(e) {
      list.innerHTML = '<li style="color:var(--danger);">Chyba připojení k ARES.</li>';
    }
  }, 350);
}

function fillForm(data) {
  if (typeof data === 'number') data = aresCache[data];
  document.getElementById('f-name').value = data.name || '';
  document.getElementById('f-ico').value = data.ico || '';
  document.getElementById('f-dic').value = data.dic || '';
  document.getElementById('f-street').value = data.street || '';
  document.getElementById('f-zip').value = data.zip || '';
  document.getElementById('f-city').value = data.city || '';
  document.getElementById('ares-results').style.display = 'none';
  document.getElementById('ares-query').value = '';
}

document.addEventListener('click', e => {
  if (!e.target.closest('.ares-wrap'))
    document.getElementById('ares-results').style.display = 'none';
});
</script>
</body></html>
